<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Results | Laini Byfield</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/site.css" />
  <script defer src="assets/js/results.js"></script>
  <style>

    .pattern-code-block {
      margin-top: 2rem;
      padding: 1.4rem 1.6rem;
      background: var(--cream, #f5f0e8);
      border: 1px solid var(--rule, #d4c9b8);
      text-align: center;
    }
    .pattern-code-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      color: var(--muted, #6b6058);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .pattern-code-value {
      font-family: 'DM Mono', monospace;
      font-size: 1.3rem;
      color: var(--accent, #7a5c3e);
      letter-spacing: 0.08em;
      margin-bottom: 0.6rem;
      font-weight: 400;
      cursor: text;
      user-select: all;
    }
    .pattern-code-instructions {
      font-size: 0.82rem;
      color: var(--ink-light, #3d3830);
      font-style: italic;
      line-height: 1.6;
      max-width: 440px;
      margin: 0 auto;
    }


    .email-send-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      align-items: center;
    }
    .result-email-input {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--ink);
      background: var(--warm-white);
      border: 1px solid var(--rule);
      padding: 0.5rem 0.8rem;
      flex: 1;
      outline: none;
      min-width: 0;
    }
    .result-email-input:focus {
      border-color: var(--accent);
    }
    .result-email-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--warm-white);
      background: var(--accent);
      border: none;
      padding: 0.5rem 1rem;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }
    .result-email-btn:hover { opacity: 0.85; }
    .result-email-btn:disabled { opacity: 0.5; cursor: default; }
    .email-privacy-note {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
      margin-top: 0.4rem;
      line-height: 1.5;
    }
    .email-send-status {
      font-size: 0.8rem;
      margin-top: 0.4rem;
      font-style: italic;
    }
    .email-success { color: var(--accent); }
    .email-error   { color: #8a3a2a; }
    .comparison-block {
      margin-top: 1rem;
      padding: 1.4rem 1.6rem;
      background: var(--warm-white, #faf7f2);
      border: 1px solid var(--rule, #d4c9b8);
    }
    .comparison-prior-code {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted, #6b6058);
      margin-bottom: 0.6rem;
    }
    .comparison-prior-code span {
      color: var(--ink-light, #3d3830);
    }
    .comparison-pattern-shift {
      font-size: 0.9rem;
      color: var(--ink, #1c1814);
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .comparison-pattern-same {
      font-size: 0.9rem;
      color: var(--ink-light, #3d3830);
      font-style: italic;
      margin-bottom: 1rem;
      line-height: 1.5;
    }
    .comparison-scores {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
    }
    .score-label {
      width: 72px;
      color: var(--muted, #6b6058);
      flex-shrink: 0;
    }
    .score-before {
      color: var(--ink-light, #3d3830);
      width: 24px;
      text-align: right;
    }
    .score-arrow {
      width: 16px;
      text-align: center;
    }
    .score-after {
      color: var(--ink, #1c1814);
      font-weight: 500;
      width: 24px;
    }
    .score-down .score-arrow { color: var(--accent, #7a5c3e); }
    .score-up   .score-arrow { color: #8a6030; }
    .score-down .score-after { color: var(--accent, #7a5c3e); }
    .secondary-pattern-callout {
      background: #e8e2d8;
      border: 1.5px solid #c4a882;
      margin-top: 2rem;
      margin-bottom: 0.5rem;
    }
    .secondary-kicker {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7a5c3e;
      display: block;
      margin-bottom: 0.6rem;
    }
    .secondary-pattern-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-style: italic;
      color: #1c1814;
      margin: 0 0 0.6rem 0;
      line-height: 1.3;
    }
    .secondary-pattern-body {
      font-size: 0.95rem;
      color: #3d3830;
      line-height: 1.75;
      margin-bottom: 0.8rem;
    }
    .secondary-pattern-note {
      font-size: 0.83rem;
      color: #6b6058;
      font-style: italic;
      line-height: 1.65;
      padding-top: 0.8rem;
      border-top: 1px solid #d4c9b8;
      margin: 0;
    }
    .result-note {
      font-size: 0.85rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.65;
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--rule);
    }
    .result-description {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.97rem;
      color: var(--ink-light);
      line-height: 1.75;
      margin-bottom: 0.8rem;
      font-style: italic;
    }
    .resource-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0.9rem 0;
      border-bottom: 1px solid #d4c9b8;
    }
    .resource-item:last-child { border-bottom: none; }
    .resource-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: #7a5c3e;
      text-decoration: none;
      font-weight: 400;
    }
    .resource-link:hover { text-decoration: underline; }
    .resource-phone {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: #6b6058;
      letter-spacing: 0.05em;
    }
    .resource-note {
      font-size: 0.78rem;
      color: #6b6058;
      font-style: italic;
    }
    .resources-box {
      background: #f5f0e8;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-name">Laini Byfield</a>
    <ul class="nav-links">
      <li><a href="assessment.html">Assessment</a></li>
      <li><a href="index.html#coaching">Coaching</a></li>
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <main class="page-shell">
    <section class="page-hero">
      <p class="eyebrow">Your results</p>
      <h1 id="pageTitle">Your results suggest a <em>pattern</em>.</h1>
      <p class="page-sub" id="pageIntro">This page is built to show one main result and only the add-ons that are relevant to it.</p>
    </section>

    <div id="noResultState" class="empty-state hidden-input">
      <p>No assessment result was found.</p>
      <a href="assessment.html" class="btn-primary no-animation">Take the Assessment</a>
    </div>

    <section id="resultSection" class="result-layout hidden-input">
      <div class="result-main" id="resultMain"></div>
    </section>
  </main>
</body>
</html>
